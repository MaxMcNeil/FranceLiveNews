<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">

<rect width="800" height="900" fill="#0b0b0b"/>

<!-- silhouette simplifiée France -->
<path d="M400,80
L520,140
L600,250
L580,380
L620,520
L540,650
L420,760
L300,720
L220,600
L200,450
L240,320
L260,200
L340,120
Z"
fill="#1a1a1a"
stroke="#444"
stroke-width="3"/>

<!-- villes (repères fixes OBS) -->
<circle cx="420" cy="220" r="6" fill="white"/> <!-- Paris -->
<circle cx="520" cy="420" r="6" fill="white"/> <!-- Lyon -->
<circle cx="480" cy="520" r="6" fill="white"/> <!-- Marseille -->
<circle cx="360" cy="480" r="6" fill="white"/> <!-- Toulouse -->
<circle cx="300" cy="320" r="6" fill="white"/> <!-- Bordeaux -->
<circle cx="550" cy="300" r="6" fill="white"/> <!-- Lille -->

</svg>
