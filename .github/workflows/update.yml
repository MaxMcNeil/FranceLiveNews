name: Update News

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    # =======================
    # PIPELINE VENTILÉE SÉPARÉE & INTELLIGENTE
    # =======================
    - run: node scripts/fetchNews.mjs
    - run: node scripts/fetchCyber.mjs
    - run: node scripts/refineNews.mjs
    - run: node scripts/clusterNews.mjs
    - run: node scripts/timeline.mjs
    - run: node scripts/summarize.mjs

    # =======================
    # COMMIT SAFE (NO EMPTY COMMITS)
    # =======================
    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add data/

        # évite les commits vides
        git diff --cached --quiet && echo "no changes" && exit 0

        git commit -m "update pipeline: split quotas, semantic refinement, and summaries"
        git push
