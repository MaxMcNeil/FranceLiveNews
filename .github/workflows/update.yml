name: Update News

on:
  schedule:
    - cron: "0 */4 * * *"  # Déclenchement automatique 1 fois toutes les 4 heures
  workflow_dispatch:       # Te permet toujours de le lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    # Force l'installation de Transformers si pas encore figé dans ton package.json
     Wilk: Install dependencies
    run: |
      npm install
      npm install @xenova/transformers

    # MISE EN CACHE DU MODÈLE : Évite de retélécharger les 480 Mo d'IA à chaque run
    - name: Cache Transformers Models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-transformers-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-transformers-

    - name: Fetch Cyber News
      run: node scripts/fetchCyber.mjs
      timeout-minutes: 5

    - run: node scripts/fetchNews.mjs
    - run: node scripts/refineNews.mjs
    - run: node scripts/clusterNews.mjs
    - run: node scripts/timeline.mjs
    - run: node scripts/summarize.mjs

    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/
        git diff --cached --quiet && echo "no changes" && exit 0
        git commit -m "update pipeline: local AI translation and 4h schedule"
        git push
        
